<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>恋爱回应力测试</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f8efef;
            color: #222;
        }

        .wrap {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 16px 40px;
        }

        .card {
            background: #fff;
            border-radius: 28px;
            padding: 36px 28px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }

        h1 {
            margin: 0;
            text-align: center;
            color: #e67f7f;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .sub {
            margin: 14px 0 30px;
            text-align: center;
            color: #666;
            font-size: 16px;
            line-height: 1.7;
        }

        .question {
            margin-bottom: 26px;
        }

        .q-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 14px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            margin-bottom: 10px;
            border-radius: 14px;
            background: #f7f7f7;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .option:hover {
            border-color: #f0b1b1;
        }

        .option input {
            width: 18px;
            height: 18px;
        }

        .option.selected {
            background: #fff3f3;
            border-color: #e67f7f;
        }

        .submit-btn,
        .back-btn,
        .reset-btn {
            width: 100%;
            border: none;
            border-radius: 18px;
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .submit-btn {
            background: #e27777;
            color: #fff;
            margin-top: 14px;
        }

        .submit-btn:hover,
        .back-btn:hover,
        .reset-btn:hover {
            opacity: 0.92;
        }

        .submit-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            gap: 14px;
            margin-top: 24px;
        }

        .back-btn {
            background: #f3d8d8;
            color: #8c5151;
        }

        .reset-btn {
            background: #e27777;
            color: #fff;
        }

        .hidden {
            display: none;
        }

        .result-top {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0eeee;
            margin-bottom: 24px;
        }

        .level-badge {
            display: inline-block;
            margin: 14px auto 10px;
            background: #fff2f2;
            color: #d55f5f;
            padding: 10px 18px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 18px;
        }

        .score {
            font-size: 44px;
            font-weight: 800;
            color: #e27777;
            margin: 6px 0;
        }

        .desc {
            color: #555;
            line-height: 1.8;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 22px;
        }

        .mini-card {
            background: #faf7f7;
            border-radius: 18px;
            padding: 18px;
        }

        .mini-card h3 {
            margin: 0 0 8px;
            font-size: 16px;
            color: #333;
        }

        .mini-card p {
            margin: 0;
            color: #666;
            line-height: 1.8;
            font-size: 14px;
        }

        .list-box {
            margin-top: 22px;
            background: #faf7f7;
            border-radius: 18px;
            padding: 18px 20px;
        }

        .list-box h3 {
            margin: 0 0 12px;
            font-size: 17px;
        }

        .list-box ul {
            margin: 0;
            padding-left: 20px;
            line-height: 1.9;
            color: #555;
        }

        .meta {
            margin-top: 18px;
            color: #999;
            font-size: 13px;
            text-align: center;
        }

        .top-link {
            text-align: right;
            margin-bottom: 12px;
        }

        .top-link button {
            border: none;
            background: transparent;
            color: #d26d6d;
            font-size: 14px;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 30px;
            }

            .card {
                padding: 24px 16px;
                border-radius: 20px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top-link">
        <button id="viewSavedReportBtn" class="hidden">查看上次报告</button>
    </div>

    <section id="quizPage" class="card hidden">
        <h1>恋爱回应力测试</h1>
        <div class="sub">
            不是看 TA 能忍你多久，而是看当关系里出现情绪、分歧、需要陪伴和安全感时，TA 会如何回应你
        </div>
        <form id="quizForm"></form>
        <button id="submitBtn" class="submit-btn" type="button">提交测试</button>
    </section>

    <section id="resultPage" class="card hidden">
        <div class="result-top">
            <h1 style="color:#222;">你的测试报告</h1>
            <div id="levelBadge" class="level-badge"></div>
            <div id="score" class="score"></div>
            <div id="desc" class="desc"></div>
            <div class="meta" id="reportTime"></div>
        </div>

        <div class="grid">
            <div class="mini-card">
                <h3>关系分析</h3>
                <p id="summaryText"></p>
            </div>
            <div class="mini-card">
                <h3>建议你关注</h3>
                <p id="attentionText"></p>
            </div>
        </div>

        <div class="list-box">
            <h3>你的核心结论</h3>
            <ul id="conclusionList"></ul>
        </div>

        <div class="list-box">
            <h3>维度得分</h3>
            <ul id="dimensionList"></ul>
        </div>

        <div class="actions">
            <button id="backBtn" class="back-btn" type="button">返回报告页</button>
            <button id="resetBtn" class="reset-btn" type="button">重新测试</button>
        </div>
    </section>
</div>

<script>
    const STORAGE_KEY = 'loveResponseLatestReport_v1';

    const questions = [
        { title: '1. 当你情绪低落、明显不开心时，对方通常会？', options: ['第一时间察觉并主动安慰你', '会关心你，但需要你先开口', '知道你不开心，但不知道怎么接', '觉得这是你自己的事，不太回应'] },
        { title: '2. 你们因为小事有点不愉快时，对方会？', options: ['愿意先缓和气氛，再和你好好说', '会解释自己的想法，但语气还算平和', '容易变得不耐烦，各说各话', '直接冷下来，不想沟通'] },
        { title: '3. 你一时不想回消息、想自己静一静时，对方会？', options: ['会关心你的状态，并留出空间', '会问你怎么了，等你想说时再聊', '会有点介意，但不太处理', '也跟着消失，完全不在意'] },
        { title: '4. 你在争执中说出“要不算了”这类气话时，对方会？', options: ['先安抚你的情绪，再认真确认你的真实想法', '会难过，但还是愿意挽回和沟通', '觉得你总拿关系说事，很疲惫', '顺势结束，不想再谈'] },
        { title: '5. 你状态不好、想让他多陪陪你时，对方会？', options: ['主动腾出时间陪你，让你安心', '会陪你一会儿，并安顿好你', '会安慰你，但更希望你自己调整', '觉得你太依赖，回应很少'] },
        { title: '6. 你因为没有安全感而有些敏感时，对方会？', options: ['认真解释并主动给你安全感', '会安抚你，但方式比较有限', '会觉得你想太多，不太想解释', '会反过来指责你不信任他'] },
        { title: '7. 你情绪一下子上来、说话比较冲时，对方会？', options: ['先接住你的情绪，等你缓下来再聊', '会陪着你，但不太知道怎么安抚', '会先躲开，等事情过去', '会直接反击，让冲突升级'] },
        { title: '8. 你提起之前没解决好的旧问题时，对方会？', options: ['愿意听你讲完，并一起处理', '会有些无奈，但还是会回应', '明显不想再提，想赶快结束', '很抗拒，甚至直接发火'] },
        { title: '9. 当你变得有点冷淡时，对方会？', options: ['主动靠近你，想弄清原因', '会小心试探，问你是不是有心事', '也会跟着疏远，减少互动', '无所谓，你冷不冷都一样'] },
        { title: '10. 你身体不舒服、状态差时，对方会？', options: ['会主动照顾你，行动上很到位', '会提醒你休息、吃药、照顾自己', '会表达关心，但做得不多', '觉得你只是小题大做'] },
        { title: '11. 你让他担心了，比如很晚才回复时，对方会？', options: ['先确认你是否安全，再和你沟通', '会有情绪，但还是以关心为主', '会直接埋怨你不懂事', '干脆不再管你'] },
        { title: '12. 他正忙的时候你联系他，对方通常会？', options: ['会尽量回应你，怕你失落', '会先告诉你在忙，之后再认真回复', '会显得有点烦躁，但还是回你', '直接不接不回，也不解释'] },
        { title: '13. 当你感到委屈甚至掉眼泪时，对方会？', options: ['会明显心疼你，认真哄你', '会安慰你，尽量让你平静下来', '会有点不知所措，只想赶快结束', '会觉得你太情绪化'] },
        { title: '14. 吵架时你说了比较重的话，对方会？', options: ['虽然受伤，但还是愿意和你修复关系', '会难过，也会表达自己的感受', '会立刻用重话回击', '会因此彻底关上心门'] },
        { title: '15. 当关系进入反复拉扯期，对方会？', options: ['愿意一起找办法改善，而不是只忍耐', '会继续维持关系，但明显会累', '会越来越敷衍，投入下降', '会直接退出，不想再消耗'] },
        { title: '16. 你的安排临时有变化、影响到他的计划时，对方会？', options: ['愿意协调配合，优先解决问题', '会有点无奈，但总体能接受', '表面答应，心里明显不高兴', '会直接发脾气，怪你添麻烦'] },
        { title: '17. 你最近状态反复、情绪起伏比较大时，对方会？', options: ['持续稳定地陪着你，不轻易放弃', '会累，但还是尽量照顾你', '开始减少回应，变得敷衍', '承受不了，想赶快抽离'] },
        { title: '18. 你们聊得不愉快时，你先挂了电话，对方会？', options: ['会主动再联系你，把话说开', '会等一会儿，再来找你', '会等你先回头', '也会赌气，不再联系'] },
        { title: '19. 你想确认自己在他心里的位置时，对方会？', options: ['愿意认真表达爱和承诺，让你安心', '会用自己的方式回应你', '会觉得这种确认很多余', '会拒绝回应，觉得你在施压'] },
        { title: '20. 当关系遇到真正的压力和磨合时，对方最后更像是？', options: ['会坚定留下来，一起解决问题', '会摇摆和疲惫，但仍不轻易放弃', '容易慢慢冷淡，减少投入', '会选择抽身，结束关系'] }
    ];

    const dimensions = {
        情绪回应: [0, 6, 12, 16],
        冲突修复: [1, 3, 7, 13, 14, 19],
        安全感建立: [2, 5, 8, 10, 17, 18],
        陪伴与投入: [4, 9, 11, 15]
    };

    const resultRules = [
        {
            min: 70,
            max: 80,
            level: '高回应力型',
            title: '他在关系里有很强的承接与修复能力',
            desc: '对方在大多数情况下都愿意靠近你、理解你、安抚你，也愿意在出现问题后主动修复关系。这说明他不仅有感情投入，也有较强的关系经营意识。',
            summary: '他的第一反应通常是沟通、安抚和靠近，而不是逃避、冷处理或对抗。',
            attention: '高回应力不代表没有边界。关系最好的状态，不是一个人一直扛，而是两个人都愿意把彼此放在心上。',
            conclusions: [
                '对方整体投入度较高，愿意经营这段关系',
                '出现矛盾时，更偏向修复而不是抽离',
                '这段关系具备较强的稳定潜力'
            ]
        },
        {
            min: 55,
            max: 69,
            level: '较高回应力型',
            title: '他愿意在意你的感受，但也需要喘息空间',
            desc: '对方整体是愿意回应你的，也希望关系往好的方向发展。但当冲突频繁、情绪密度太高时，他也会感觉疲惫，偶尔出现退缩或敷衍。',
            summary: '他不是不在乎，而是在乎的同时，也很需要轻松和秩序感。',
            attention: '你们的关键，不是去验证谁更爱，而是建立更舒服、更稳定的互动方式。',
            conclusions: [
                '对方有一定包容度和投入意愿',
                '关系维系能力不错，但承压并非无限',
                '减少拉扯感，会让这段关系更顺'
            ]
        },
        {
            min: 40,
            max: 54,
            level: '波动回应型',
            title: '他会回应，但稳定性不足',
            desc: '对方并不是完全不在乎你，只是当关系进入情绪压力或反复磨合时，他的回应会明显波动，容易从解释转向疲惫、从靠近转向退后。',
            summary: '他更像是“有感情，但不太擅长处理高浓度关系问题”的类型。',
            attention: '如果你们长期陷入反复拉扯，关系容易慢慢降温，而不是突然结束。',
            conclusions: [
                '对方不是没感情，但修复力有限',
                '关系中容易积累委屈和误解',
                '越缺少有效沟通，越容易走向疏离'
            ]
        },
        {
            min: 20,
            max: 39,
            level: '低回应力型',
            title: '他在关系中的承接意愿与能力都偏弱',
            desc: '当关系里出现情绪、需求或冲突时，对方更容易选择回避、防御、冷处理，甚至直接抽离。这说明他当前要么投入不足，要么已经对这段关系缺乏耐心。',
            summary: '他更容易把关系压力视为负担，而不是一起面对的问题。',
            attention: '这个结果值得认真看待。长期处在这样的互动里，你会越来越缺安全感，他也会越来越想离开。',
            conclusions: [
                '对方对关系压力的承接能力偏低',
                '冲突后的修复质量较弱',
                '需要判断是关系失衡，还是对方本身就不擅长亲密关系经营'
            ]
        }
    ];

    const quizPage = document.getElementById('quizPage');
    const resultPage = document.getElementById('resultPage');
    const quizForm = document.getElementById('quizForm');
    const submitBtn = document.getElementById('submitBtn');
    const backBtn = document.getElementById('backBtn');
    const resetBtn = document.getElementById('resetBtn');
    const viewSavedReportBtn = document.getElementById('viewSavedReportBtn');

    function renderQuiz() {
        quizForm.innerHTML = questions.map((q, qIndex) => `
            <div class="question">
                <div class="q-title">${q.title}</div>
                ${q.options.map((op, opIndex) => `
                    <label class="option">
                        <input type="radio" name="q${qIndex}" value="${4 - opIndex}" />
                        <span>${op}</span>
                    </label>
                `).join('')}
            </div>
        `).join('');

        quizForm.querySelectorAll('.option input').forEach(input => {
            input.addEventListener('change', () => {
                const name = input.name;
                document.querySelectorAll(`input[name="${name}"]`).forEach(i => {
                    i.closest('.option').classList.toggle('selected', i.checked);
                });
            });
        });
    }

    function getAnswers() {
        const answers = [];
        for (let i = 0; i < questions.length; i++) {
            const checked = document.querySelector(`input[name="q${i}"]:checked`);
            if (!checked) return null;
            answers.push(Number(checked.value));
        }
        return answers;
    }

    function getDimensionScore(answers, indexes) {
        const total = indexes.reduce((sum, idx) => sum + answers[idx], 0);
        const max = indexes.length * 4;
        return Math.round((total / max) * 100);
    }

    function buildReport(answers) {
        const totalScore = answers.reduce((a, b) => a + b, 0);
        const result = resultRules.find(item => totalScore >= item.min && totalScore <= item.max);

        const dimensionScores = Object.entries(dimensions).map(([name, indexes]) => ({
            name,
            score: getDimensionScore(answers, indexes)
        }));

        const report = {
            totalScore,
            maxScore: 80,
            level: result.level,
            title: result.title,
            desc: result.desc,
            summary: result.summary,
            attention: result.attention,
            conclusions: result.conclusions,
            dimensionScores,
            answers,
            createdAt: new Date().toLocaleString('zh-CN')
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(report));
        return report;
    }

    function renderReport(report) {
        document.getElementById('levelBadge').textContent = `${report.level}｜${report.title}`;
        document.getElementById('score').textContent = `${report.totalScore} / ${report.maxScore}`;
        document.getElementById('desc').textContent = report.desc;
        document.getElementById('summaryText').textContent = report.summary;
        document.getElementById('attentionText').textContent = report.attention;
        document.getElementById('reportTime').textContent = `生成时间：${report.createdAt}`;

        document.getElementById('conclusionList').innerHTML = report.conclusions
            .map(item => `<li>${item}</li>`)
            .join('');

        document.getElementById('dimensionList').innerHTML = report.dimensionScores
            .map(item => `<li>${item.name}：${item.score} 分</li>`)
            .join('');
    }

    function showQuiz() {
        resultPage.classList.add('hidden');
        quizPage.classList.remove('hidden');
    }

    function showReport() {
        quizPage.classList.add('hidden');
        resultPage.classList.remove('hidden');
    }

    function loadSavedReport() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        try {
            return JSON.parse(raw);
        } catch (e) {
            return null;
        }
    }

    submitBtn.addEventListener('click', () => {
        const answers = getAnswers();
        if (!answers) {
            alert('请先完成全部 20 道题，再提交测试。');
            return;
        }

        const report = buildReport(answers);
        renderReport(report);
        showReport();
        history.replaceState(null, '', '#report');
    });

    backBtn.addEventListener('click', () => {
        const report = loadSavedReport();
        if (report) {
            renderReport(report);
            showReport();
            history.replaceState(null, '', '#report');
        }
    });

    resetBtn.addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        quizForm.reset();
        quizForm.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
        showQuiz();
        history.replaceState(null, '', '#quiz');
        viewSavedReportBtn.classList.add('hidden');
    });

    viewSavedReportBtn.addEventListener('click', () => {
        const report = loadSavedReport();
        if (report) {
            renderReport(report);
            showReport();
        }
    });

    function init() {
        renderQuiz();

        const savedReport = loadSavedReport();
        if (savedReport) {
            viewSavedReportBtn.classList.remove('hidden');
        }

        if (location.hash === '#report' && savedReport) {
            renderReport(savedReport);
            showReport();
        } else {
            showQuiz();
        }
    }

    init();
</script>
</body>
</html>
