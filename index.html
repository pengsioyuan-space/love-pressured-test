<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>恋爱忍耐度测试</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f8efef;
            color: #222;
        }
        .wrap {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 16px 40px;
        }
        .card {
            background: #fff;
            border-radius: 28px;
            padding: 36px 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,.04);
        }
        h1 {
            margin: 0;
            text-align: center;
            color: #e67f7f;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .sub {
            margin: 14px 0 30px;
            text-align: center;
            color: #666;
            font-size: 16px;
            line-height: 1.7;
        }
        .question {
            margin-bottom: 26px;
        }
        .q-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            margin-bottom: 10px;
            border-radius: 14px;
            background: #f7f7f7;
            border: 2px solid transparent;
            cursor: pointer;
            transition: .2s ease;
        }
        .option:hover { border-color: #f0b1b1; }
        .option input { width: 18px; height: 18px; }
        .option.selected {
            background: #fff3f3;
            border-color: #e67f7f;
        }
        .submit-btn, .back-btn, .reset-btn {
            width: 100%;
            border: none;
            border-radius: 18px;
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: .2s ease;
        }
        .submit-btn {
            background: #e27777;
            color: #fff;
            margin-top: 14px;
        }
        .submit-btn:hover, .back-btn:hover, .reset-btn:hover { opacity: .92; }
        .submit-btn:disabled {
            opacity: .55;
            cursor: not-allowed;
        }
        .actions {
            display: flex;
            gap: 14px;
            margin-top: 24px;
        }
        .back-btn {
            background: #f3d8d8;
            color: #8c5151;
        }
        .reset-btn {
            background: #e27777;
            color: #fff;
        }
        .hidden { display: none; }
        .result-top {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0eeee;
            margin-bottom: 24px;
        }
        .level-badge {
            display: inline-block;
            margin: 14px auto 10px;
            background: #fff2f2;
            color: #d55f5f;
            padding: 10px 18px;
            border-radius: 999px;
            font-weight: 800;
            font-size: 18px;
        }
        .score {
            font-size: 44px;
            font-weight: 800;
            color: #e27777;
            margin: 6px 0;
        }
        .desc {
            color: #555;
            line-height: 1.8;
            font-size: 16px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 22px;
        }
        .mini-card {
            background: #faf7f7;
            border-radius: 18px;
            padding: 18px;
        }
        .mini-card h3 {
            margin: 0 0 8px;
            font-size: 16px;
            color: #333;
        }
        .mini-card p {
            margin: 0;
            color: #666;
            line-height: 1.8;
            font-size: 14px;
        }
        .list-box {
            margin-top: 22px;
            background: #faf7f7;
            border-radius: 18px;
            padding: 18px 20px;
        }
        .list-box h3 {
            margin: 0 0 12px;
            font-size: 17px;
        }
        .list-box ul {
            margin: 0;
            padding-left: 20px;
            line-height: 1.9;
            color: #555;
        }
        .meta {
            margin-top: 18px;
            color: #999;
            font-size: 13px;
            text-align: center;
        }
        .top-link {
            text-align: right;
            margin-bottom: 12px;
        }
        .top-link button {
            border: none;
            background: transparent;
            color: #d26d6d;
            font-size: 14px;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            h1 { font-size: 30px; }
            .card { padding: 24px 16px; border-radius: 20px; }
            .grid { grid-template-columns: 1fr; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top-link">
        <button id="viewSavedReportBtn" class="hidden">查看上次报告</button>
    </div>

    <section id="quizPage" class="card hidden">
        <h1>恋爱忍耐度测试</h1>
        <div class="sub">通过你闹情绪、哭、发脾气时，对方的真实反应，测试他对你的忍耐程度</div>
        <form id="quizForm"></form>
        <button id="submitBtn" class="submit-btn">提交测试</button>
    </section>

    <section id="resultPage" class="card hidden">
        <div class="result-top">
            <h1 style="color:#222;">你的测试报告</h1>
            <div id="levelBadge" class="level-badge"></div>
            <div id="score" class="score"></div>
            <div id="desc" class="desc"></div>
            <div class="meta" id="reportTime"></div>
        </div>

        <div class="grid">
            <div class="mini-card">
                <h3>关系分析</h3>
                <p id="summaryText"></p>
            </div>
            <div class="mini-card">
                <h3>建议你关注</h3>
                <p id="attentionText"></p>
            </div>
        </div>

        <div class="list-box">
            <h3>你的核心结论</h3>
            <ul id="conclusionList"></ul>
        </div>

        <div class="list-box">
            <h3>维度得分</h3>
            <ul id="dimensionList"></ul>
        </div>

        <div class="actions">
            <button id="backBtn" class="back-btn" type="button">返回报告页</button>
            <button id="resetBtn" class="reset-btn" type="button">重新测试</button>
        </div>
    </section>
</div>

<script>
    const STORAGE_KEY = 'loveToleranceLatestReport_v1';

    const questions = [
        { title: '1. 你哭了的时候，对方会？', options: ['立刻心疼哄你，抱紧你', '有点慌，轻声安慰', '不耐烦，让你别哭了', '无视，直接不理你'] },
        { title: '2. 你因为小事发脾气，他会？', options: ['耐心包容，顺着你', '解释几句，不想吵架', '也生气，跟你对着吵', '直接冷暴力不说话'] },
        { title: '3. 你闹脾气不回消息，他会？', options: ['疯狂找你，怕你出事', '发几条消息哄你', '等你消气再出现', '跟着消失，无所谓'] },
        { title: '4. 你无理取闹提分手，他会？', options: ['拼命挽留，害怕失去你', '难过，劝你别乱说', '无奈，觉得你很烦', '顺着你，真的同意分'] },
        { title: '5. 你失眠要他陪，他很累时会？', options: ['撑着困意陪你', '陪一会儿再睡', '让你自己乖乖睡', '嫌你烦，直接睡'] },
        { title: '6. 你吃醋生气，他会？', options: ['立刻解释，给足安全感', '安抚你，说你多想', '觉得你小题大做', '怪你不信任他'] },
        { title: '7. 你情绪崩溃发泄，他会？', options: ['抱住你，让你冷静', '陪着你，不说话', '躲开，等你自己好', '指责你情绪不稳定'] },
        { title: '8. 你翻旧账吵架，他会？', options: ['耐心听，跟你和解', '无奈，但不凶你', '打断你，不想提', '发火，让你闭嘴'] },
        { title: '9. 你故意冷淡对他，他会？', options: ['主动靠近，哄你开心', '小心翼翼问你怎么了', '也对你冷淡', '无所谓，不在乎'] },
        { title: '10. 你生病作闹要照顾，他会？', options: ['心疼照顾，寸步不离', '提醒你吃药喝水', '让你自己多休息', '觉得你事多麻烦'] },
        { title: '11. 你晚回消息让他担心，你闹时他会？', options: ['只担心你，不怪你', '有点生气但原谅你', '指责你不懂事', '直接不理你'] },
        { title: '12. 你在他忙的时候打扰他，他会？', options: ['抽空回你，怕你失落', '忙完立刻找你', '嫌你烦，让你别闹', '直接挂电话不回'] },
        { title: '13. 你委屈掉眼泪，他会？', options: ['心疼到不知所措', '擦你眼泪，安慰你', '叹气，无动于衷', '嫌你矫情，让你收住'] },
        { title: '14. 你吵架说狠话伤他，他会？', options: ['难过但不怪你', '伤心但依然让着你', '也说狠话回击你', '彻底心寒，想放弃'] },
        { title: '15. 你作到他很累，他会？', options: ['依然舍不得对你凶', '默默忍受，不爆发', '跟你摊牌，说受不了', '直接离开，不回头'] },
        { title: '16. 你任性打乱他的计划，他会？', options: ['顺着你，以你为先', '无奈接受，陪你', '不开心，但忍了', '发火，怪你不懂事'] },
        { title: '17. 你情绪反复，一天闹好几次，他会？', options: ['一直耐心，不放弃你', '累但依然哄你', '开始敷衍，懒得理', '崩溃，跟你决裂'] },
        { title: '18. 你闹脾气挂他电话，他会？', options: ['立刻打回来，疯狂找你', '等一下再打给你', '不打，等你打回去', '也生气，再也不打'] },
        { title: '19. 你因为没安全感逼他证明爱你，他会？', options: ['尽全力给你安全感', '尽量配合你', '觉得你烦，不想配合', '拒绝，说你病态'] },
        { title: '20. 你把他作到极限，他最后会？', options: ['依然爱你，选择包容', '难过，但不离开', '心死，慢慢冷淡', '彻底放手，不再回头'] }
    ];

    const dimensions = {
        情绪接纳: [0, 6, 12, 16],
        冲突包容: [1, 3, 7, 13, 14, 19],
        安全感投入: [2, 5, 8, 10, 17, 18],
        日常陪伴: [4, 9, 11, 15]
    };

    const resultRules = [
        {
            min: 70,
            max: 80,
            level: '超高忍耐度型',
            title: '他对你的情绪承接能力很强',
            desc: '对方在大多数情况下都愿意哄你、解释你、包容你，说明他在关系里投入度高，也愿意维持稳定感。这个结果不等于可以无限消耗，而是代表他当前对这段关系有较强的耐心和责任感。',
            summary: '他的第一反应通常是安抚、解释、靠近你，而不是躲开或对抗。整体属于高投入、高包容的伴侣类型。',
            attention: '高忍耐度不代表没有边界。你更需要珍惜他的耐心，学会在情绪过去后进行修复和感谢。',
            conclusions: ['对方当前情感投入高，愿意承担关系中的情绪成本', '遇到矛盾时，他更偏向安抚和维系，而非逃避', '这段关系具备较强稳定性，但也要防止长期单向消耗']
        },
        {
            min: 55,
            max: 69,
            level: '中高忍耐度型',
            title: '他愿意包容你，但也会累',
            desc: '对方整体上是愿意哄你、让着你、尽量维持关系的，但在频繁争执、被误解或长期情绪压力下，他也会出现疲惫、退缩或者敷衍。',
            summary: '他不是不在乎，而是更需要节奏和空间。只要关系不持续失衡，他通常愿意继续沟通。',
            attention: '你们的关系关键不在“爱不爱”，而在“能不能建立更健康的互动方式”。',
            conclusions: ['对方有包容力，但承压上限有限', '关系可持续性取决于双方是否愿意调整相处方式', '适合增加正向反馈，减少试探和情绪拉扯']
        },
        {
            min: 40,
            max: 54,
            level: '中等忍耐度型',
            title: '他会忍，但不会一直忍',
            desc: '对方对你的情绪并非完全无感，但更多是阶段性忍让。遇到问题时，他可能会先解释、再退让，最后转为冷淡、自保或者减少投入。',
            summary: '这是典型的“会维持关系，但不擅长承接高频情绪”的类型。爱可能有，但耐心并不稳定。',
            attention: '如果你们已经反复陷入拉扯，建议尽快改善沟通，不然关系容易慢慢降温。',
            conclusions: ['对方并非完全不在乎，但他的耐心存在明显阈值', '关系中容易出现累积委屈和情绪账单', '越是高频测试，越容易把对方推向疏离']
        },
        {
            min: 20,
            max: 39,
            level: '低忍耐度型',
            title: '他对情绪压力的承受能力偏低',
            desc: '对方在你情绪化、需要安抚或发生冲突时，更容易表现出不耐烦、回避、防御甚至反击。这说明他对关系中的情绪劳动意愿较低，或者已经处于明显疲惫状态。',
            summary: '他更容易把你的情绪理解成麻烦，而不是求助信号，因此在关键时刻的回应质量偏低。',
            attention: '这个结果需要重视。若关系长期如此，你会越来越缺安全感，他也会越来越想逃。',
            conclusions: ['对方承接情绪的意愿偏弱', '关系中的冲突恢复力较差', '需要判断这是性格使然，还是关系已经严重透支']
        }
    ];

    const quizPage = document.getElementById('quizPage');
    const resultPage = document.getElementById('resultPage');
    const quizForm = document.getElementById('quizForm');
    const submitBtn = document.getElementById('submitBtn');
    const backBtn = document.getElementById('backBtn');
    const resetBtn = document.getElementById('resetBtn');
    const viewSavedReportBtn = document.getElementById('viewSavedReportBtn');

    function renderQuiz() {
        quizForm.innerHTML = questions.map((q, qIndex) => `
        <div class="question">
          <div class="q-title">${q.title}</div>
          ${q.options.map((op, opIndex) => `
            <label class="option">
              <input type="radio" name="q${qIndex}" value="${4 - opIndex}" />
              <span>${op}</span>
            </label>
          `).join('')}
        </div>
      `).join('');

        quizForm.querySelectorAll('.option input').forEach(input => {
            input.addEventListener('change', () => {
                const name = input.name;
                document.querySelectorAll(`input[name="${name}"]`).forEach(i => {
                    i.closest('.option').classList.toggle('selected', i.checked);
                });
            });
        });
    }

    function getAnswers() {
        const answers = [];
        for (let i = 0; i < questions.length; i++) {
            const checked = document.querySelector(`input[name="q${i}"]:checked`);
            if (!checked) return null;
            answers.push(Number(checked.value));
        }
        return answers;
    }

    function getDimensionScore(answers, indexes) {
        const total = indexes.reduce((sum, idx) => sum + answers[idx], 0);
        const max = indexes.length * 4;
        return Math.round((total / max) * 100);
    }

    function buildReport(answers) {
        const totalScore = answers.reduce((a, b) => a + b, 0);
        const result = resultRules.find(item => totalScore >= item.min && totalScore <= item.max);

        const dimensionScores = Object.entries(dimensions).map(([name, indexes]) => ({
            name,
            score: getDimensionScore(answers, indexes)
        }));

        const report = {
            totalScore,
            maxScore: 80,
            level: result.level,
            title: result.title,
            desc: result.desc,
            summary: result.summary,
            attention: result.attention,
            conclusions: result.conclusions,
            dimensionScores,
            answers,
            createdAt: new Date().toLocaleString('zh-CN')
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(report));
        return report;
    }

    function renderReport(report) {
        document.getElementById('levelBadge').textContent = `${report.level}｜${report.title}`;
        document.getElementById('score').textContent = `${report.totalScore} / ${report.maxScore}`;
        document.getElementById('desc').textContent = report.desc;
        document.getElementById('summaryText').textContent = report.summary;
        document.getElementById('attentionText').textContent = report.attention;
        document.getElementById('reportTime').textContent = `生成时间：${report.createdAt}`;

        document.getElementById('conclusionList').innerHTML = report.conclusions
            .map(item => `<li>${item}</li>`)
            .join('');

        document.getElementById('dimensionList').innerHTML = report.dimensionScores
            .map(item => `<li>${item.name}：${item.score} 分</li>`)
            .join('');
    }

    function showQuiz() {
        resultPage.classList.add('hidden');
        quizPage.classList.remove('hidden');
    }

    function showReport() {
        quizPage.classList.add('hidden');
        resultPage.classList.remove('hidden');
    }

    function loadSavedReport() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        try {
            return JSON.parse(raw);
        } catch {
            return null;
        }
    }

    submitBtn.addEventListener('click', () => {
        const answers = getAnswers();
        if (!answers) {
            alert('请先完成全部 20 道题，再提交测试。');
            return;
        }
        const report = buildReport(answers);
        renderReport(report);
        showReport();
        history.replaceState(null, '', '#report');
    });

    backBtn.addEventListener('click', () => {
        const report = loadSavedReport();
        if (report) {
            renderReport(report);
            showReport();
            history.replaceState(null, '', '#report');
        }
    });

    resetBtn.addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        quizForm.reset();
        quizForm.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
        showQuiz();
        history.replaceState(null, '', '#quiz');
        viewSavedReportBtn.classList.add('hidden');
    });

    viewSavedReportBtn.addEventListener('click', () => {
        const report = loadSavedReport();
        if (report) {
            renderReport(report);
            showReport();
        }
    });

    function init() {
        renderQuiz();
        const savedReport = loadSavedReport();
        if (savedReport) {
            viewSavedReportBtn.classList.remove('hidden');
        }

        if (location.hash === '#report' && savedReport) {
            renderReport(savedReport);
            showReport();
        } else {
            showQuiz();
        }
    }

    init();
</script>
</body>
</html>
